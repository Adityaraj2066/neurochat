<!DOCTYPE html>
<html>
<head>
    <title>Upgrade to Pro</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            background: #343541;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #202123;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #10a37f;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>₹ Upgrade to PRO</h2>
    <p>Unlimited chats for ₹500</p>

    <button onclick="pay()">Pay ₹500</button>
</div>

<script>

function getToken() {
    return localStorage.getItem("token");
}

// 🔥 MAIN PAYMENT FUNCTION
async function pay() {

    if (!getToken()) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    try {

        // ✅ CREATE ORDER
        const res = await fetch("/api/payment/create-order", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + getToken()
            }
        });

        const order = await res.json();

        // ✅ RAZORPAY OPTIONS
        const options = {
            key: "rzp_test_xxxxx", // 🔥 your key
            amount: order.amount,
            currency: order.currency,
            name: "NeuroChat",
            description: "Pro Upgrade",
            order_id: order.id,

            handler: async function (response) {

                // ✅ VERIFY PAYMENT
                await fetch("/api/payment/verify-payment", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + getToken()
                    }
                });

                alert("Payment successful 🚀 Please login again");

                // 🔥 IMPORTANT: OLD TOKEN INVALID
                localStorage.removeItem("token");

                window.location.href = "login.html";
            }
        };

        const rzp = new Razorpay(options);
        rzp.open();

    } catch (err) {
        console.log(err);
        alert("Payment failed");
    }
}

</script>

</body>
</html>
