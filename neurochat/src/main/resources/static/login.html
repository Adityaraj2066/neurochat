<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #343541;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #202123;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            outline: none;
            background: #40414f;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #10a37f;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>

function login() {

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {

        if (!data.token) {
            alert("❌ Invalid Credentials");
            return;
        }

        localStorage.setItem("token", data.token);
        window.location.href = "chat.html";
    })
    .catch(err => {
        alert("Server error");
        console.log(err);
    });
}

</script>

</body>
</html>
